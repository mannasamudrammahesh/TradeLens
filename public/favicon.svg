<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0EA5E9"/>
  
  <!-- Chart bars representing stock data -->
  <rect x="12" y="38" width="6" height="14" fill="white" rx="1"/>
  <rect x="22" y="28" width="6" height="24" fill="white" rx="1"/>
  <rect x="32" y="20" width="6" height="32" fill="white" rx="1"/>
  <rect x="42" y="32" width="6" height="20" fill="white" rx="1"/>
  
  <!-- Trend line -->
  <path d="M 10 42 L 20 32 L 30 24 L 40 28 L 54 18" 
        stroke="#10B981" 
        stroke-width="2.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- Dots on trend line -->
  <circle cx="10" cy="42" r="2" fill="#10B981"/>
  <circle cx="20" cy="32" r="2" fill="#10B981"/>
  <circle cx="30" cy="24" r="2" fill="#10B981"/>
  <circle cx="40" cy="28" r="2" fill="#10B981"/>
  <circle cx="54" cy="18" r="2" fill="#10B981"/>
</svg>
